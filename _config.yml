# ======================================================================
#  Site settings — Minimal Mistakes (remote theme)
# ======================================================================
title:        "Hyung Kyu Kim"
name:         "Hyung Kyu Kim"
description:  "Ph.D. Student at Chung-Ang University — Multimodal Learning (Vision · Language · Audio)"
url:          "https://kimhyungkyu-1208.github.io"
baseurl:      "/HYUNG-KYU-KIM"          # keep in sync with the published GitHub Pages path
repository:   "kimhyungkyu-1208/Hyungkyu_Kim"
locale:       "en-US"

# ---- Theme ----------------------------------------------------------
remote_theme:           "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin:  "default"        # default | air | aqua | contrast | dark | dirt | neon | mint | plum | sunrise
search:                 true

# ---- Build ----------------------------------------------------------
markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true

# ---- Author (left profile sidebar) ----------------------------------
author:
  name:     "Hyung Kyu Kim"
  avatar:   "/assets/images/photos/portrait.jpg"
  bio:      "Ph.D. Student at Chung-Ang University. Multimodal learning across vision, language, and audio."
  location: "Seoul, South Korea"
  links:
    - label: "Email"
      icon:  "fas fa-fw fa-envelope-square"
      url:   "mailto:hyung1208@cau.ac.kr"
    - label: "Google Scholar"
      icon:  "fas fa-fw fa-graduation-cap"
      url:   "https://scholar.google.com/citations?user=zW9d84UAAAAJ&hl=ko"
    - label: "GitHub"
      icon:  "fab fa-fw fa-github"
      url:   "https://github.com/kimhyungkyu-1208"
    - label: "LinkedIn"
      icon:  "fab fa-fw fa-linkedin"
      url:   "https://www.linkedin.com/in/rlagudrb1208/"
    - label: "CV"
      icon:  "fas fa-fw fa-file-alt"
      url:   "/assets/pdf/CV26-HK_v02.pdf"

# ---- Footer ---------------------------------------------------------
footer:
  links:
    - label: "GitHub"
      icon:  "fab fa-fw fa-github"
      url:   "https://github.com/kimhyungkyu-1208"
    - label: "LinkedIn"
      icon:  "fab fa-fw fa-linkedin"
      url:   "https://www.linkedin.com/in/rlagudrb1208/"

# ---- Plugins (all GitHub Pages compatible) --------------------------
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-sitemap

# ---- Collections (existing content kept) ----------------------------
collections:
  publications:
    output: false
  news:
    output: false

# ---- Defaults -------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# ---- Exclude from build --------------------------------------------
exclude:
  - _archive_old_theme
  - example
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
